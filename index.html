<!doctype html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f2f2f7">
    <title>Hızlı Rehber Pro</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #f2f2f7; margin: 0; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        input:focus { outline: none; }
        ::-webkit-scrollbar { width: 0; }
        .contact-card { transition: all 0.2s; }
        .contact-card:active { transform: scale(0.97); opacity: 0.8; }
    </style>
</head>
<body class="h-full">
    <div id="app" class="h-full w-full flex justify-center">
        <div id="app-frame" class="w-full max-w-[430px] h-full flex flex-col relative overflow-hidden bg-[#f2f2f7] sm:my-5 sm:h-[calc(100vh-40px)] sm:rounded-[30px] sm:border-[8px] sm:border-[#1c1c1e] sm:shadow-2xl">
            
            <div class="flex-shrink-0 px-5 pt-8 pb-3">
                <div class="flex justify-between items-center mb-1">
                    <h1 class="font-bold text-3xl text-[#1c1c1e] cursor-pointer" title="Yükle">Rehber</h1>
                    <div class="flex gap-3 items-center">
                        <span onclick="exportContacts()" class="text-[#007aff] cursor-pointer" title="Dışa Aktar">
                            <i data-lucide="download" class="w-6 h-6"></i>
                        </span>
                        <span onclick="deleteAllContacts()" class="text-[#ff3b30] cursor-pointer" title="Tümünü Sil">
                            <i data-lucide="trash-2" class="w-6 h-6"></i>
                        </span>
                        <label for="fileInput" class="text-[#007aff] cursor-pointer" title="vCard Aktar">
                            <i data-lucide="import" class="w-6 h-6"></i>
                        </label>
                        <span id="addBtn" class="text-[#007aff] cursor-pointer">
                            <i data-lucide="plus" class="w-7 h-7"></i>
                        </span>
                    </div>
                </div>
                <div id="contactCount" class="text-xs text-[#8e8e93] font-medium">0 kişi</div>
            </div>

            <input id="fileInput" type="file" accept=".vcf,.txt" class="hidden">

            <div id="contactList" class="flex-1 overflow-auto pb-24">
                <div id="emptyState" class="flex flex-col items-center justify-center py-20 hidden">
                    <div class="rounded-full flex items-center justify-center mb-4 w-20 h-20 bg-[#e5e5ea]">
                        <i data-lucide="users" class="w-10 h-10 text-[#8e8e93]"></i>
                    </div>
                    <p class="text-[#8e8e93] font-medium">Henüz kişi yok</p>
                </div>
                <div id="listContent"></div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 px-5 pb-8 pt-4 bg-[#f2f2f7]/90 backdrop-blur-md border-t border-[#e5e5ea]">
                <div class="flex items-center gap-2 px-4 py-3 rounded-2xl bg-[#e5e5ea]">
                    <i data-lucide="search" class="w-5 h-5 text-[#8e8e93]"></i>
                    <input id="searchInput" type="text" placeholder="Hızlı ara..." class="bg-transparent flex-1 text-base text-[#1c1c1e]">
                </div>
            </div>

            <div id="modal" class="absolute inset-0 z-50 hidden bg-black/40 backdrop-blur-sm">
                <div class="absolute bottom-0 left-0 right-0 slide-up rounded-t-[32px] bg-[#f2f2f7] max-h-[95%] shadow-2xl overflow-y-auto">
                    <div class="flex justify-between items-center px-6 py-5 sticky top-0 bg-[#f2f2f7] z-10 border-b border-[#e5e5ea]">
                        <span id="modalCancel" class="text-[#007aff] cursor-pointer text-lg">İptal</span>
                        <span id="modalTitle" class="font-bold text-lg">Yeni Kişi</span>
                        <span id="modalSave" class="font-bold text-[#007aff] cursor-pointer text-lg">Bitti</span>
                    </div>
                    
                    <div class="p-6 space-y-4">
                        <div class="flex justify-center mb-2">
                            <div id="photoPreview" class="w-24 h-24 rounded-full bg-white border-2 border-white shadow-md overflow-hidden flex items-center justify-center">
                                <i data-lucide="user" class="w-12 h-12 text-[#8e8e93]"></i>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-[#e5e5ea]">
                            <input id="inputName" type="text" placeholder="Ad Soyad" class="w-full px-5 py-4 border-b border-[#f2f2f7] text-lg">
                            <input id="inputPhone" type="tel" placeholder="Telefon" class="w-full px-5 py-4 border-b border-[#f2f2f7] text-lg">
                            <input id="inputEmail" type="email" placeholder="E-posta" class="w-full px-5 py-4 border-b border-[#f2f2f7] text-lg">
                            <textarea id="inputNote" placeholder="Not" class="w-full px-5 py-4 text-lg min-h-[100px]"></textarea>
                        </div>
                        
                        <button id="deleteBtn" class="hidden w-full py-4 bg-white text-[#ff3b30] rounded-2xl font-bold text-lg shadow-sm border border-[#e5e5ea]">Kişiyi Sil</button>
                    </div>
                </div>
            </div>

            <div id="toast" class="absolute bottom-28 left-1/2 -translate-x-1/2 hidden px-6 py-3 rounded-full bg-black/80 text-white text-sm font-medium z-[60] text-center min-w-[200px]"></div>
        </div>
    </div>

    <script>
        let contacts = [];
        let currentEditId = null;
        let currentPhotoBase64 = null;

        // --- CORE FUNCTIONS ---
        function loadData() {
            const data = localStorage.getItem('rehber_vcard_mustafa');
            contacts = data ? JSON.parse(data) : [];
            renderList();
        }

        function saveData() {
            localStorage.setItem('rehber_vcard_mustafa', JSON.stringify(contacts));
            renderList();
        }

        // --- DECODER & PARSER ---
        function decodeQuotedPrintable(str) {
            return str.replace(/=([0-9A-F]{2})/gi, (match, hex) => String.fromCharCode(parseInt(hex, 16)))
                      .replace(/=\r?\n/g, '');
        }

        function parseVCard(text) {
            const vCards = text.split(/BEGIN:VCARD/i).slice(1);
            const imported = [];

            vCards.forEach(card => {
                const lines = card.split(/\r?\n/);
                let entry = { id: Math.random().toString(36).substr(2, 9), name: '', phone: '', email: '', note: '', photo: null };

                lines.forEach(line => {
                    const colonIndex = line.indexOf(':');
                    if (colonIndex === -1) return;

                    let keyPart = line.substring(0, colonIndex);
                    let value = line.substring(colonIndex + 1).trim();

                    if (/ENCODING=QUOTED-PRINTABLE/i.test(keyPart)) {
                        try {
                            const decodedHex = decodeQuotedPrintable(value);
                            value = decodeURIComponent(escape(decodedHex));
                        } catch (e) { value = decodeQuotedPrintable(value); }
                    }

                    if (keyPart.startsWith('FN')) entry.name = value;
                    else if (keyPart.startsWith('N') && !entry.name) {
                        entry.name = value.split(';').filter(p => p).reverse().join(' ').trim();
                    }
                    else if (keyPart.startsWith('TEL')) entry.phone = value.replace(/[^0-9+]/g, '');
                    else if (keyPart.startsWith('EMAIL')) entry.email = value;
                    else if (keyPart.startsWith('NOTE')) entry.note = value;
                    else if (keyPart.startsWith('PHOTO')) entry.photo = value;
                });
                if (entry.name || entry.phone) imported.push(entry);
            });
            return imported;
        }

        // --- ACTIONS ---
        function exportContacts() {
            if (contacts.length === 0) return showToast("Rehber boş");
            let vcf = "";
            contacts.forEach(c => {
                vcf += `BEGIN:VCARD\nVERSION:3.0\nFN:${c.name}\nTEL;TYPE=CELL:${c.phone}\n`;
                if(c.email) vcf += `EMAIL:${c.email}\n`;
                if(c.note) vcf += `NOTE:${c.note}\n`;
                if(c.photo) vcf += `PHOTO;BASE64:${c.photo}\n`;
                vcf += "END:VCARD\n";
            });
            const blob = new Blob([vcf], { type: "text/vcard" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `Rehber_Yedek_${new Date().toLocaleDateString()}.vcf`;
            a.click();
            showToast("Rehber indirildi");
        }

        function deleteAllContacts() {
            if (confirm("Tüm rehber silinecek. Emin misiniz?")) {
                contacts = [];
                saveData();
                showToast("Rehber temizlendi");
            }
        }

        function renderList() {
            const listContent = document.getElementById('listContent');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = contacts.filter(c => 
                (c.name||"").toLowerCase().includes(search) || (c.phone||"").includes(search)
            ).sort((a, b) => (a.name||"").localeCompare(b.name||"", 'tr'));

            document.getElementById('contactCount').textContent = `${contacts.length} kişi`;
            
            if (filtered.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                listContent.innerHTML = '';
            } else {
                document.getElementById('emptyState').classList.add('hidden');
                let html = '', lastLetter = '';
                filtered.forEach(c => {
                    const letter = (c.name ? c.name[0] : '#').toUpperCase();
                    if (letter !== lastLetter) {
                        html += `<div class="px-5 py-2 text-xs font-bold text-[#8e8e93] sticky top-0 bg-[#f2f2f7]/95 backdrop-blur-sm z-10">${letter}</div>`;
                        lastLetter = letter;
                    }
                    const avatar = c.photo ? `<img src="data:image/jpeg;base64,${c.photo}" class="w-12 h-12 rounded-full object-cover">` : 
                        `<div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg shrink-0" style="background:${getAvatarColor(c.name)}">${(c.name||"?")[0].toUpperCase()}</div>`;
                    
                    html += `<div class="bg-white mx-4 rounded-2xl mb-3 shadow-sm contact-card cursor-pointer p-4 flex items-center gap-4" onclick="editContact('${c.id}')">
                                ${avatar}
                                <div class="min-w-0">
                                    <div class="text-[#1c1c1e] font-bold text-lg leading-tight truncate">${c.name || 'İsimsiz'}</div>
                                    <div class="text-[#8e8e93] text-sm mt-0.5">${c.phone || ''}</div>
                                </div>
                             </div>`;
                });
                listContent.innerHTML = html;
            }
            lucide.createIcons();
        }

        // --- UI EVENTS ---
        document.getElementById('addBtn').onclick = () => {
            currentEditId = null; currentPhotoBase64 = null;
            document.getElementById('modalTitle').textContent = "Yeni Kişi";
            document.getElementById('inputName').value = '';
            document.getElementById('inputPhone').value = '';
            document.getElementById('inputEmail').value = '';
            document.getElementById('inputNote').value = '';
            document.getElementById('photoPreview').innerHTML = '<i data-lucide="user" class="w-12 h-12 text-[#8e8e93]"></i>';
            document.getElementById('deleteBtn').classList.add('hidden');
            document.getElementById('modal').classList.remove('hidden');
            lucide.createIcons();
        };

        window.editContact = (id) => {
            const c = contacts.find(x => x.id === id);
            currentEditId = id; currentPhotoBase64 = c.photo;
            document.getElementById('modalTitle').textContent = "Düzenle";
            document.getElementById('inputName').value = c.name;
            document.getElementById('inputPhone').value = c.phone;
            document.getElementById('inputEmail').value = c.email || '';
            document.getElementById('inputNote').value = c.note || '';
            document.getElementById('photoPreview').innerHTML = c.photo ? `<img src="data:image/jpeg;base64,${c.photo}" class="w-full h-full object-cover">` : '<i data-lucide="user" class="w-12 h-12 text-[#8e8e93]"></i>';
            document.getElementById('deleteBtn').classList.remove('hidden');
            document.getElementById('modal').classList.remove('hidden');
            lucide.createIcons();
        };

        document.getElementById('modalSave').onclick = () => {
            const name = document.getElementById('inputName').value.trim();
            const phone = document.getElementById('inputPhone').value.trim();
            if(!name && !phone) return showToast("İsim veya No gerekli");
            const data = { id: currentEditId || Date.now().toString(), name, phone, email: document.getElementById('inputEmail').value, note: document.getElementById('inputNote').value, photo: currentPhotoBase64 };
            if(currentEditId) contacts[contacts.findIndex(c => c.id === currentEditId)] = data;
            else contacts.push(data);
            saveData();
            document.getElementById('modal').classList.add('hidden');
            showToast("Kaydedildi");
        };

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const newOnes = parseVCard(ev.target.result);
                contacts = [...contacts, ...newOnes];
                saveData();
                showToast(`${newOnes.length} kişi eklendi`);
            };
            reader.readAsText(e.target.files[0]);
        };

        function showToast(m) {
            const t = document.getElementById('toast'); t.textContent = m;
            t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 2000);
        }

        function getAvatarColor(n) {
            const colors = ['#007aff','#34c759','#ff3b30','#ff9500','#af52de','#5856d6'];
            let h = 0; const s = n || "?";
            for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
            return colors[Math.abs(h) % colors.length];
        }

        document.getElementById('modalCancel').onclick = () => document.getElementById('modal').classList.add('hidden');
        document.getElementById('searchInput').oninput = renderList;
        document.getElementById('deleteBtn').onclick = () => {
            if(confirm("Silinsin mi?")) {
                contacts = contacts.filter(c => c.id !== currentEditId);
                saveData(); document.getElementById('modal').classList.add('hidden');
            }
        };

        loadData();
    </script>
</body>
</html>
