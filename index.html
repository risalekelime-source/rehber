<!doctype html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DDH Rehber</title>


    <!-- Manifest Bağlantısı -->
<link rel="manifest" href="manifest.json">

<!-- iOS (Apple) İçin Uygulama Ayarları -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rehber">

<!-- Durum Çubuğu Rengi (Android ve iOS) -->
<meta name="theme-color" content="#f2f2f7">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #f2f2f7; margin: 0; overscroll-behavior-y: contain; }
        input:focus { outline: none; }
        ::-webkit-scrollbar { width: 0; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="h-full overflow-hidden">
    <div id="app" class="h-full w-full flex justify-center">
        <div class="w-full max-w-[430px] h-full flex flex-col relative overflow-hidden bg-[#f2f2f7]">
            
            <!-- Header -->
            <div class="flex-shrink-0 px-6 pt-12 pb-3 safe-top">
                <h2 class="font-bold text-3xl text-[#1c1c1e] tracking-tight">Rehber</h2>
                <div id="contactCount" class="text-xs text-[#8e8e93] font-bold mt-1 uppercase tracking-wider">Yükleniyor...</div>
            </div>

            <!-- Liste Alanı -->
            <div id="contactList" class="flex-1 overflow-auto pb-32">
                <div id="listContent" class="space-y-1"></div>
            </div>

            <!-- Arama Çubuğu -->
            <div class="absolute bottom-0 left-0 right-0 px-5 pb-8 pt-4 bg-[#f2f2f7]/80 backdrop-blur-xl border-t border-[#d1d1d6] safe-bottom">
                <div class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-[#e3e3e8]">
                    <i data-lucide="search" class="w-4 h-4 text-[#8e8e93]"></i>
                    <input id="searchInput" type="text" placeholder="İsim veya numara ara..." class="bg-transparent flex-1 text-base text-[#1c1c1e] outline-none">
                </div>
            </div>

        </div>
    </div>

    <script>
        let contacts = [];

        // TXT DOSYASINDAN VERİ ÇEKME
        async function loadData() {
            try {
                // rehber.txt dosyasını oku (Cache engellemek için zaman damgası eklendi)
                const response = await fetch('rehber.txt?t=' + Date.now());
                const text = await response.text();
                
                // Satır satır parçala ve objeye dönüştür
                contacts = text.split('\n')
                    .filter(line => line.trim().includes(';'))
                    .map(line => {
                        const [name, phone] = line.split(';');
                        return { 
                            name: name.trim(), 
                            phone: phone.trim() 
                        };
                    });
                
                renderList();
            } catch (error) {
                document.getElementById('listContent').innerHTML = `
                    <div class="p-10 text-center text-[#8e8e93]">
                        <p>rehber.txt bulunamadı veya okunamadı.</p>
                    </div>`;
                console.error("Hata:", error);
            }
        }

       // Türkçe karakterleri normalize eden yardımcı fonksiyon
function normalizeText(text) {
    return text
        .toString()
        .normalize('NFD') // Karakterleri bileşenlerine ayırır (Ş -> S + ¸)
        .replace(/[\u0300-\u036f]/g, "") // Diakritik işaretleri temizler
        .replace(/İ/g, "i") // Büyük İ için özel düzeltme
        .replace(/I/g, "i") // Büyük I için özel düzeltme
        .replace(/ı/g, "i") // Küçük ı için özel düzeltme
        .toLowerCase() // Hepsini küçük harfe çevir
        .replace(/[ğ]/g, "g")
        .replace(/[ü]/g, "u")
        .replace(/[ş]/g, "s")
        .replace(/[ö]/g, "o")
        .replace(/[ç]/g, "c");
}

function renderList() {
    const listContent = document.getElementById('listContent');
    const searchInput = document.getElementById('searchInput').value;
    const normalizedSearch = normalizeText(searchInput);
    
    // Sabit numara ayarı (Daha önce konuştuğumuz gibi)
    const sabitSantralNo = "03267121719"; 

    // Filtreleme mantığı
    const filtered = contacts.filter(c => {
        const nameMatch = normalizeText(c.name).includes(normalizedSearch);
        const phoneMatch = c.phone.toString().includes(normalizedSearch);
        return nameMatch || phoneMatch;
    }).sort((a, b) => a.name.localeCompare(b.name, 'tr'));

    document.getElementById('contactCount').textContent = `${filtered.length} KİŞİ BULUNDU`;
    
    let html = '';
    let lastLetter = '';

    filtered.forEach(c => {
        const letter = (c.name[0] || '#').toUpperCase();
        if (letter !== lastLetter) {
            html += `<div class="px-6 py-2 text-xs font-bold text-[#8e8e93] sticky top-0 bg-[#f2f2f7]/95 backdrop-blur-sm z-10">${letter}</div>`;
            lastLetter = letter;
        }
        
        const aramaLinki = `tel:${sabitSantralNo},,${c.phone}`;

        html += `
            <a href="${aramaLinki}" class="block bg-white mx-4 rounded-2xl mb-2 shadow-sm active:scale-[0.98] transition-transform no-underline">
                <div class="flex items-center gap-4 p-4">
                    <div class="w-11 h-11 rounded-full flex items-center justify-center text-white font-bold text-lg shrink-0" style="background:${getAvatarColor(c.name)}">
                        ${c.name.charAt(0).toUpperCase()}
                    </div>
                    <div class="min-w-0">
                        <div class="text-[#1c1c1e] font-bold text-[17px] leading-tight truncate">${c.name}</div>
                        <div class="text-[#8e8e93] text-[14px] mt-0.5 font-medium italic">Dahili: ${c.phone}</div>
                    </div>
                    <div class="ml-auto text-[#34c759]">
                        <i data-lucide="phone-forwarded" class="w-5 h-5"></i>
                    </div>
                </div>
            </a>`;
    });
    
    listContent.innerHTML = html || '<div class="p-10 text-center text-[#8e8e93]">Eşleşme bulunamadı</div>';
    lucide.createIcons();
}

        function getAvatarColor(name) {
            const colors = ['#007aff','#34c759','#ff3b30','#ff9500','#af52de','#5856d6','#ff2d55'];
            let hash = 0;
            for (let i = 0; i < (name || "").length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        document.getElementById('searchInput').oninput = renderList;

        // Sayfa açıldığında veriyi yükle
        loadData();
    </script>
</body>
</html>
